<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAYSE — ссылки</title>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Фон */
        .neon-bg {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #05070a, #0a0d11);
            background-size: 300% 300%;
            animation: gradientFlow 12s ease-in-out infinite;
            z-index: -2;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Заголовок */
        .title {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #6fc9e3, #e0d0ff);
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 18px #6fc9e355;
        }

        /* Слоган */
        .subtitle {
            font-size: 22px;
            margin-bottom: 40px;
            color: #6fc9e3;
            opacity: 0.9;
            text-shadow: 0 0 12px #6fc9e355;
        }

        /* Всплывающие слова */
        .floating-word {
            position: fixed;
            font-size: 32px;
            font-weight: bold;
            opacity: 0;
            animation: floatWord 6s infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes floatWord {
            0% { opacity: 0; transform: translateY(20px); }
            20% { opacity: 0.25; }
            50% { opacity: 0.20; }
            80% { opacity: 0.25; }
            100% { opacity: 0; transform: translateY(-20px); }
        }

        /* Колонки */
        .columns {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            width: 100%;
            max-width: 900px;
            margin-top: 20px;
        }

        /* Карточки */
        .column {
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(14px) saturate(180%);
            box-shadow: 0 0 18px #6fc9e322, 0 0 28px #e0d0ff22;
            animation: fadeUp 1s ease forwards;
            opacity: 0;
            transition: 0.35s;
        }

        .column:hover {
            box-shadow: 0 0 22px #6fc9e355, 0 0 40px #e0d0ff55;
            border-color: #6fc9e3;
            transform: translateY(-6px);
        }

        .column h2 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 22px;
            background: linear-gradient(90deg, #6fc9e3, #e0d0ff);
            -webkit-background-clip: text;
            color: transparent;
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(25px); filter: blur(6px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        /* Кнопки */
        .link {
            text-decoration: none;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid transparent;
            border-radius: 14px;
            color: #fff;
            font-size: 17px;
            transition: 0.25s;
            display: flex;
            align-items: center;
            gap: 14px;

            background-image:
                linear-gradient(#000000dd, #000000dd),
                linear-gradient(90deg, #6fc9e3, #e0d0ff);
            background-origin: border-box;
            background-clip: padding-box, border-box;
        }

        .link:hover {
            transform: translateY(-4px);
            box-shadow: 0 0 14px #6fc9e388, 0 0 26px #e0d0ff66;
        }

        /* Иконки — текстовые */
        .icon-box {
            background: none;
            font-weight: 900;
            font-size: 22px;
        }

        /* Цвета */
        .yt { color: #FF0000; }
        .tw { color: #9146FF; }
        .vk { color: #0077FF; }
        .tg { color: #2AABEE; }
        .ct { color: #00C2FF; }
        .da { color: #FF8C00; }

        /* DONATEX — квадратная X как на втором скрине */
        .dx {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            background: #111; /* квадрат */
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-size: 22px;

            /* Градиент X */
            background-image: linear-gradient(135deg, #6fc9e3, #8a5bff);
            -webkit-background-clip: text;
            color: transparent;

            text-shadow: 0 0 8px #8a5bff55;
        }

    </style>
</head>
<body>

    <div class="neon-bg"></div>

    <div class="title">RAYSE</div>
    <div class="subtitle">Будущее — в играх!</div>

    <script>
        const words = [
            "ПОДПИШИСЬ", "ЛАЙК", "ПОДДЕРЖКА", "RAYSE",
            "СТРИМЫ", "УГАР", "ВЕСЕЛЬЕ", "ТЫ ЛУЧШИЙ"
        ];

        function spawnWord() {
            const word = document.createElement("div");
            word.className = "floating-word";
            word.innerText = words[Math.floor(Math.random() * words.length)];

            word.style.left = Math.random() * 100 + "%";
            word.style.top = Math.random() * 100 + "%";

            word.style.background = "linear-gradient(90deg, #6fc9e3, #e0d0ff)";
            word.style.webkitBackgroundClip = "text";
            word.style.color = "transparent";
            word.style.opacity = 0.25;

            word.style.animationDuration = (4 + Math.random() * 4) + "s";

            document.body.appendChild(word);
            setTimeout(() => word.remove(), 6000);
        }

        setInterval(spawnWord, 900);
    </script>

            </a>

                Telegram

            <a class="link" href="https://live.vkvideo.ru/rays" target="_blank">
